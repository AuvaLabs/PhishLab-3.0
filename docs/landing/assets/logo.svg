<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="PhishLab 3.0">
  <title>PhishLab 3.0</title>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a0a4b8"/>
    </linearGradient>
  </defs>

  <!-- Icon mark — same hook-formed P as favicon, in 64x64 viewport -->
  <g transform="translate(8 8)">
    <rect width="64" height="64" rx="14" fill="#0a0c10"/>
    <path d="M 18 14 L 38 14 A 11 11 0 0 1 38 36 L 18 36"
          fill="none" stroke="url(#brand)" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 18 14 L 18 46 Q 18 54 11 54 Q 5 54 5 47"
          fill="none" stroke="url(#brand)" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="5" cy="47" r="2.6" fill="url(#brand)"/>
  </g>

  <!-- Wordmark — display weight + mono version tag -->
  <text x="92" y="48"
        font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="34" font-weight="800" letter-spacing="-1.2"
        fill="url(#text)">PhishLab</text>
  <text x="259" y="48"
        font-family="'JetBrains Mono','SF Mono',Consolas,monospace"
        font-size="20" font-weight="700"
        fill="url(#brand)">3.0</text>

  <!-- Tagline subline -->
  <text x="93" y="66"
        font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="10" font-weight="600" letter-spacing="2.4"
        fill="#5c6170">PHISHING ENGAGEMENT PLATFORM</text>
</svg>
